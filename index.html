<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eletrotécnica 2026 - Senai</title>
  <link rel="stylesheet" href="style/style.css">
  <link rel="shortcut icon" href="assets/imgs/logotransparente.png" type="image/x-icon">
</head>
<body>

<header>
  <div class="logo">
    <img src="assets/imgs/logotransparente.png" alt="logo">
    <button class="button-nop" onclick="renderizarPagina('home')">
      <h1 class="logo-titulo">
        <span>E</span>
        <span>l</span>
        <span>e</span>
        <span>t</span>
        <span>r</span>
        <span>o</span>
        <span>T</span>
        <span>é</span>
        <span>c</span>
        <span>n</span>
        <span>i</span>
        <span>c</span>
        <span>a</span>
      </h1>
    </button>
  </div>

  <nav class="menu-secundario">
    <button class="button-nop" onclick="renderizarPagina('materias')"><a class="card-menu" id="card-materias">Matérias</a></button>
    <button class="button-nop" onclick="renderizarPagina('normas')"><a class="card-menu" id="card-normas">Normas Técnicas</a></button>
    <button class="button-nop" onclick="renderizarPagina('senai')"><a class="card-menu" id="card-senai">SENAI</a></button>
  </nav>
</header>

<main id="conteudo">
  <h2>
    Bem-vindo ao nosso site da Eletrotécnica 2026!
  </h2>
  <div id="base-conteudo-center">
    <div class="card" id="Materias">
      <img src="assets/imgs/Materias.svg" alt="Materias" class="img-cards">
      <h3>Matérias</h3>
      <p>Acesso a algumas matérias já concluidas.</p>
      <button onclick="renderizarPagina('materias')">Acessar</button>
    </div>
    <div class="card" id="Normas-Tecnicas">
      <img src="assets/imgs/Normas Tecnicas.svg" alt="Normas Tecnicas" class="img-cards">
      <h3>Normas Técnicas</h3>
      <p>Acesso às normas técnicas.</p>
      <button onclick="renderizarPagina('normas')">Acessar</button>     
    </div>
    <div class="card" id="Senai">
      <img src="assets/imgs/Senai.svg" alt="Senai" class="img-cards">
      <h3>Senai</h3>
      <p>Links relacionados ao Senai em geral.</p>
      <button onclick="renderizarPagina('senai')">Acessar</button>
    </div>
  </div>

</main>

<footer>
  <p>Todos Direitos Reservados Por @VictorHugo.Tec.Br</p>
  <p>Turma Eletrotecnica 2026 | Site Em Construção</p>
</footer>

  <script src="main.js"></script>

</body>
</html>
